  <form action="" method="post">
    <section id="head" class="mt-5">
      <div class="container row mx-auto mt-5">
        <div class="col-12 col-md-6">
          <img src="../../imgs/placeholserNewsImg1.png" class="img-fluid">
          <div class="input-group">
            <input type="file" class="form-control" id="inputGroupFile04" aria-describedby="inputGroupFileAddon04"
              name="imagen" aria-label="Upload" required>
          </div>
        </div>
        <div class="col-12 col-md-6 d-flex justify-content-around align-items-center">
          <div class="row">

            <input class="form-control form-control-lg mb-3" type="text" placeholder=".form-control-lg" name="titulo"
              required aria-label=".form-control-lg example">

            <div class="d-flex gap-2 fs-5">
              <select class="form-select" aria-label="Default select example" name="tag">
                <option selected>Seleccione..</option>
                <option value="1">Tag</option>
                <option value="2">Tag</option>
                <option value="3">Tag</option>
              </select>
            </div>
            <div class="d-flex gap-2 fs-5">
              <select class="form-select" aria-label="Default select example" name="cat">
                <option selected>Seleccione..</option>
                <option value="1">Cat</option>
                <option value="2">Cat</option>
                <option value="3">Cat</option>
              </select>
            </div>
            <div class="d-flex gap-2 fs-4">
              <p class="fst-italic">by</p>
              <input type="text" class="form-control" name="author" required>
            </div>
            <input type="date" class="form-control" name="fecha" required>
          </div>
        </div>
      </div>
    </section>


    <hr class="mt-5">


    <section id="content">
      <div class="mx-auto d-flex flex-column gap-3 justify-content-around align-items-center">
        <textarea name="contenido" required rows="50" cols="100" class="w-50 w-lg-100">
        </textarea>
        <button type="submit" class="btn btn-lg btn-outline-warning">Guardar</button>
      </div>
    </section>
