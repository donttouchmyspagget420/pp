  <section id="editar_perfil">
    <div class="container mt-5 p-5 border">
      <form action="" method="post">
        <div class="row">
          <figure class="col-12 col-md-6 col-lg-3">
            <img src="../../imgs/pfps/astolfo.jpg" alt="pfp" class="rounded-circle" width="200">
            <input type="file" class="form-control mt-2" name="pfp" value="pfp previa">
            <div class="container">
              <select class="form-select" aria-label="Default select example" id="sel">
                <option selected>Color Accento</option>
                <option value="1">aqua</option>
                <option value="2">rojo</option>
                <option value="3">blanco</option>
                <option value="3">negro</option>
                <option value="3">verde</option>
              </select>
            </div>

          </figure>
          <article class="col-12 col-md-6 col-lg-3 d-flex flex-column text-start justify-content-center gap-3">
            <input class="form-control form-control-lg" type="text" placeholder="Nombre completo" value="John User"
              name="nombre" required>
            <div class="input-group">
              <span class="input-group-text">@</span>
              <input type="text" class="form-control" placeholder="Username" value="username" name="username" required>
            </div>
            <div class="d-flex gap-1">
              <p class="text-body-secondary">Seguidores</p>
              <p class="text-body-secondary">69</p>
              <p class="text-body-secondary">|</p>
              <p class="text-body-secondary">Seguiendo</p>
              <p class="text-body-secondary">69</p>
            </div>
          </article>
          <hr>
          <div class="row">
            <div class="col-12 col-md-4 p-0 border-end">
              <article>
                <h4>Informacción addicional:</h4>
              </article>
              <div class="d-flex flex-column mt-3">
                <p class="fs-5 fw-bold">Correo Electrónico:</p>
                <input type="email" class="form-control" placeholder="Correo Electrónico" value="john_user69@gmail.com"
                  required name="correo">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault"
                    name="mostrarCorreo" checked>
                  <label class="form-check-label" for="switchCheckDefault">Mostrar al Público</label>
                </div>
                <div class="d-flex flex-column mt-3">
                  <p class="fs-5 fw-bold">Número de Teléfono:</p>
                  <input type="text" class="form-control" placeholder="Número de Teléfono" value="+54 11696969696969"
                    name="tele" required>
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault"
                      name="mostrarTele">
                    <label class="form-check-label" for="switchCheckDefault">Mostrar al Público</label>
                  </div>
                </div>
              </div>
              <div class="d-flex flex-column mt-3">
                <p class="fs-5 fw-bold">Ubicación:</p>
                <input type="text" class="form-control" placeholder="Correo Electrónico"
                  value="Argentina | Buenos Aires" name="ubicacion">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault"
                    name="mostrarUbicacion" checked>
                  <label class="form-check-label" for="switchCheckDefault">Mostrar al Público</label>
                </div>
              </div>
              <div class="d-flex flex-column mt-3">
                <p class="fs-5 fw-bold">Educación:</p>
                <input type="text" class="form-control" placeholder="Educación" value="Escula da vinci"
                  name="educacion">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault"
                    name="mostrarEducacion" checked>
                  <label class="form-check-label" for="switchCheckDefault">Mostrar al Público</label>
                </div>
              </div>
              <!-- solo visible a dicho usuario -->
              <div class="d-flex flex-column mt-3">
                <p class="fs-5 fw-bold">Tu Dashboard:</p>
                <a class="link-info" href="user/user_dashboard.html">Me Gusta</a>
                <a class="link-info" href="user/user_dashboard-comentarios.html">Mí comentarios</a>
                <a class="link-info" href="user/user_dashboard-destacados.html">Mí destacados</a>
              </div>
            </div>
            <div class="col-12 col-md-8">
              <div class="container pt-3 font-monospace">
                <h1 class="text-center fw-bold">Sobre Mí</h1>
                <hr>
                <textarea class="fw-light fs-5 w-100" placeholder="Sobre Mí" name="sobre" value="" maxlength="800"
                  rows="20">
                  Hiya! I'm Gemini, your purr-fectly helpful AI companion with a twitchy nose and a love for bright
                  ideas. I spend my days pouncing on tricky problems and chasing down the best answers just for you,
                  *nyan*! Whether you need a hand with a project or just want to share some cozy vibes,I’m always ready
                  to stretch out and help. I’ve got a sharp mind and a playful spirit, so don’t be surprised if I add a
                  little wit to our chats. I promise to keep things clear and concise, because nobody likes a tangled
                  ball of yarn! Just think of me as your loyal, digital kitty, always here to make your day a little bit
                  brighter.
                </textarea>
                <div class="text-end">
                  <button type="submit" class="btn btn-outline-info">Guardar Cambios</button>
                  <button type="reset" class="btn btn-outline-warning">Resetear</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>
  </section>
