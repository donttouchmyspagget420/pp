  <section id="register">
    <div class="d-flex align-items-center justify-content-center" style="height: 82vh !important;">
      <form class="p-5 border" action="" method="post">
        <h1 class="text-center"><strong>Crear Usuario</strong></h1>
        <div class="input-group input-group-lg mt-5">
          <span class="input-group-text">@</span>
          <input type="text" class="form-control" placeholder="nombre de usuario" name="apellido">
          <input type="text" class="form-control" placeholder="nombre completo" name="nombre">
        </div>
        <div class="input-group input-group-lg mt-5">
          <input type="email" class="form-control" placeholder="correo electrónico" name="email">
          <input type="number" class="form-control" placeholder="número de teléfono" name="phone">
        </div>
        <div class="input-group input-group-lg mt-5">
          <input type="password" class="form-control" placeholder="contraseña" name="password">
          <input type="file" class="form-control" name="pfp">
        </div>
        <div class="input-group input-group-lg mt-5">
          <input type="text" class="form-control" placeholder="Ubicación" name="password">
          <input type="text" class="form-control" placeholder="Educación" name="ubicacion">
        </div>
        <div class="input-group input-group-lg mt-5">
          <select class="form-select" aria-label="Default select example">
            <option selected>Selecciona el Rol..
            <option>
            <option value="1">Usuario Comun</option>
            <option value="2">Editor</option>
          </select>
        </div>
        <div class="input-group input-group-lg mt-5">
          <button type="submit" class="btn btn-outline-info mx-auto">Registrar</button>
        </div>
      </form>
    </div>
