  <section id="configuracion">
    <div class="container mt-5">
      <h1 class="text-start">Configuraciones</h1>
      <form action="" method="post" class="border p-5">

        <h2 class="text-center">Apariencia</h2>

        <hr>

        <div class="row">
          <div class="col-6">
            <div class="container">
              <label class="fs-5" for="sel">Color Accento - Usuario</label>
              <select class="form-select" aria-label="Default select example" id="sel">
                <option selected>Seleccione</option>
                <option value="1">aqua</option>
                <option value="2">rojo</option>
                <option value="3">blanco</option>
                <option value="3">negro</option>
                <option value="3">verde</option>
              </select>
            </div>
          </div>

          <div class="col-6">
            <div class="container">
              <label class="fs-5" for="inputGroupFile04">pfp por defecto - Usuario</label>
              <input type="file" class="form-control" id="inputGroupFile04" aria-describedby="inputGroupFileAddon04"
                aria-label="Upload">
            </div>
          </div>
        </div>



        <div class="row mt-5">
          <div class="col-6">
            <div class="container">
              <label class="fs-5" for="sel">Color Accento - Editor</label>
              <select class="form-select" aria-label="Default select example" id="sel">
                <option selected>Seleccione</option>
                <option value="1">aqua</option>
                <option value="2">rojo</option>
                <option value="3">blanco</option>
                <option value="3">negro</option>
                <option value="3">verde</option>
              </select>
            </div>
          </div>

          <div class="col-6">
            <div class="container">
              <label class="fs-5" for="inputGroupFile04">pfp por defecto - Editor</label>
              <input type="file" class="form-control" id="inputGroupFile04" aria-describedby="inputGroupFileAddon04"
                aria-label="Upload">
            </div>
          </div>
        </div>

        <div class="row mt-5">
          <div class="col-6">
            <div class="container">
              <label class="fs-5" for="sel">Color Accento - Admin</label>
              <select class="form-select" aria-label="Default select example" id="sel">
                <option selected>Seleccione</option>
                <option value="1">aqua</option>
                <option value="2">rojo</option>
                <option value="3">blanco</option>
                <option value="3">negro</option>
                <option value="3">verde</option>
              </select>
            </div>
          </div>

          <div class="col-6">
            <div class="container">
              <label class="fs-5" for="inputGroupFile04">pfp por defecto - Admin</label>
              <input type="file" class="form-control" id="inputGroupFile04" aria-describedby="inputGroupFileAddon04"
                aria-label="Upload">
            </div>
          </div>
        </div>


        <h2 class="text-center mt-5">Permisos</h2>

        <hr>

        <div class="row">
          <div class="col-6">
            <div class="container">
              <div class="input-group">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault" checked>
                  <label class="form-check-label" for="switchCheckDefault">Editores pueden remover los
                    comentarios</label>
                </div>
              </div>
            </div>
          </div>
          <div class="col-6">
            <div class="container">
              <div class="input-group">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault" checked>
                  <label class="form-check-label" for="switchCheckDefault">
                    Usuarios pueden modificar su propio comentario
                  </label>
                </div>
              </div>
            </div>
          </div>
        </div>


        <h2 class="text-center mt-5">Limites</h2>

        <hr>
        <div class="row">
          <div class="col-6">
            <div class="container">
              <label class="form-check-label" for="switchCheckDefault">
                Límite de número de publicaciones por persona
              </label>
              <input class="form-control" type="number" id="switchCheckDefault">
            </div>
          </div>
          <div class="col-6">
            <div class="container">
              <label class="form-check-label" for="switchCheckDefault">
                Límite de número de comentarios por persona
              </label>
              <input class="form-control" type="number" id="switchCheckDefault">
            </div>
          </div>
        </div>



      </form>
    </div>
